<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Patient Management - Interactive ERD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;background:#0d1117;color:#c9d1d9;overflow:hidden;height:100vh;display:flex;flex-direction:column}
.header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0;z-index:100}
.header h1{font-size:16px;color:#f0f6fc;white-space:nowrap}
.tabs{display:flex;gap:0}
.tab{padding:8px 18px;cursor:pointer;font-size:13px;font-weight:500;color:#8b949e;border:1px solid #30363d;background:#0d1117;transition:all .15s;user-select:none}
.tab:first-child{border-radius:6px 0 0 6px}
.tab:last-child{border-radius:0 6px 6px 0}
.tab+.tab{border-left:none}
.tab:hover{color:#c9d1d9;background:#161b22}
.tab.active{color:#f0f6fc;background:#238636;border-color:#238636}
.zoom-controls{display:flex;align-items:center;gap:6px;margin-left:auto}
.zoom-btn{width:32px;height:32px;border:1px solid #30363d;background:#161b22;color:#c9d1d9;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.zoom-btn:hover{background:#30363d;color:#f0f6fc}
.zoom-label{font-size:12px;color:#8b949e;min-width:45px;text-align:center}
.main{display:flex;flex:1;overflow:hidden}
.api-panel{width:340px;min-width:340px;background:#161b22;border-right:1px solid #30363d;display:flex;flex-direction:column;flex-shrink:0;z-index:50}
.api-panel-header{padding:12px 16px;border-bottom:1px solid #30363d;display:flex;align-items:center;justify-content:space-between}
.api-panel-header h2{font-size:13px;color:#f0f6fc;font-weight:600}
.api-clear{font-size:11px;color:#58a6ff;cursor:pointer;padding:4px 8px;border-radius:4px;border:none;background:none}
.api-clear:hover{background:#1f2937}
.api-list{flex:1;overflow-y:auto;padding:8px}
.api-list::-webkit-scrollbar{width:6px}
.api-list::-webkit-scrollbar-track{background:transparent}
.api-list::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
.api-group{margin-bottom:4px}
.api-group-title{font-size:11px;font-weight:600;color:#8b949e;padding:8px 8px 4px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none}
.api-group-title::before{content:'';display:inline-block;width:0;height:0;border-left:4px solid #8b949e;border-top:3px solid transparent;border-bottom:3px solid transparent;transition:transform .15s}
.api-group.open .api-group-title::before{transform:rotate(90deg)}
.api-group-items{display:none;padding:2px 0}
.api-group.open .api-group-items{display:block}
.api-btn{display:flex;align-items:center;gap:8px;width:100%;padding:5px 8px;border:none;background:none;cursor:pointer;border-radius:4px;text-align:left;transition:all .1s;font-family:inherit}
.api-btn:hover{background:#1f2937}
.api-btn.active{background:#1a3a5c;outline:1px solid #58a6ff}
.api-method{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;min-width:42px;text-align:center;font-family:'SFMono-Regular',Consolas,monospace;flex-shrink:0}
.m-GET{background:#1a3a1a;color:#56d364}
.m-POST{background:#3a3a1a;color:#e3b341}
.m-PUT{background:#1a2a3a;color:#79c0ff}
.m-PATCH{background:#2a1a3a;color:#bc8cff}
.m-DELETE{background:#3a1a1a;color:#f85149}
.m-WS{background:#1a3a3a;color:#39d5ff}
.api-path{font-size:11px;color:#c9d1d9;font-family:'SFMono-Regular',Consolas,monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.api-desc{font-size:10px;color:#6e7681;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.api-btn-info{display:flex;flex-direction:column;gap:1px;overflow:hidden;min-width:0}
.viewport{flex:1;overflow:hidden;position:relative;cursor:grab}
.viewport:active{cursor:grabbing}
.canvas{position:absolute;transform-origin:0 0;will-change:transform}
.rel-svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
.tbl{position:absolute;border-radius:6px;overflow:hidden;border:2px solid #30363d;background:#161b22;min-width:220px;transition:opacity .2s,border-color .2s,box-shadow .2s;font-size:12px;cursor:default}
.tbl.dimmed{opacity:.15!important}
.tbl.highlighted{border-color:#58a6ff;box-shadow:0 0 16px rgba(88,166,255,.35);z-index:10}
.tbl-head{padding:7px 10px;font-weight:700;font-size:12px;color:#fff;display:flex;align-items:center;gap:6px}
.tbl-cols{padding:4px 0}
.tbl-col{display:flex;align-items:center;padding:2px 10px;font-family:'SFMono-Regular',Consolas,monospace;font-size:11px;gap:6px;line-height:1.5}
.tbl-col-badge{font-size:9px;font-weight:700;min-width:18px;text-align:center;border-radius:2px;padding:0 3px}
.badge-pk{background:#e3b341;color:#1a1500}
.badge-fk{background:#58a6ff;color:#001a33}
.tbl-col-name{color:#c9d1d9}
.tbl-col-type{color:#6e7681;margin-left:auto;font-size:10px}
.g-org .tbl-head{background:#1a3a5f}
.g-patient .tbl-head{background:#5a3a00}
.g-obs .tbl-head{background:#004a5a}
.g-treat .tbl-head{background:#3a1a5a}
.g-measure .tbl-head{background:#5a2000}
.g-notify .tbl-head{background:#1a3a1a}
.g-qa .tbl-head{background:#4a1a3a}
.rel-line{stroke:#30363d;stroke-width:1.5;fill:none;transition:opacity .2s,stroke .2s}
.rel-line.dimmed{opacity:.05}
.rel-line.highlighted{stroke:#58a6ff;stroke-width:2;opacity:1}
.rel-marker{fill:#30363d;transition:opacity .2s,fill .2s}
.rel-marker.dimmed{opacity:.05}
.rel-marker.highlighted{fill:#58a6ff}
.minimap{position:absolute;bottom:12px;right:12px;width:180px;height:120px;background:#161b22;border:1px solid #30363d;border-radius:6px;overflow:hidden;z-index:50;opacity:.8}
.minimap:hover{opacity:1}
.minimap canvas{width:100%;height:100%}
.minimap-viewport{position:absolute;border:1.5px solid #58a6ff;background:rgba(88,166,255,.08);pointer-events:none}
.legend{position:absolute;top:12px;right:12px;background:#161b22ee;border:1px solid #30363d;border-radius:6px;padding:10px 14px;font-size:11px;z-index:50;display:flex;flex-direction:column;gap:4px}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:10px;height:10px;border-radius:2px}
.toggle-panel{display:none;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#8b949e;cursor:pointer;padding:6px;font-size:18px;position:absolute;top:12px;left:12px;z-index:50}
.api-panel.hidden{display:none}
.api-panel.hidden~.viewport .toggle-panel{display:block}
.panel-close{cursor:pointer;color:#8b949e;font-size:16px;border:none;background:none;padding:2px}
.panel-close:hover{color:#f0f6fc}
</style>
</head>
<body>
<div class="header">
  <h1>Interactive ERD</h1>
  <div class="tabs">
    <div class="tab active" onclick="switchService('web')">Web</div>
    <div class="tab" onclick="switchService('mobile')">Mobile</div>
    <div class="tab" onclick="switchService('biosignal')">Biosignal</div>
  </div>
  <div class="zoom-controls">
    <button class="zoom-btn" onclick="zoomBy(-0.15)" title="Zoom Out">-</button>
    <span class="zoom-label" id="zoomLabel">100%</span>
    <button class="zoom-btn" onclick="zoomBy(0.15)" title="Zoom In">+</button>
    <button class="zoom-btn" onclick="zoomFit()" title="Fit" style="font-size:12px">Fit</button>
    <button class="zoom-btn" onclick="zoomReset()" title="Reset" style="font-size:12px">1:1</button>
  </div>
</div>
<div class="main">
  <div class="api-panel" id="apiPanel">
    <div class="api-panel-header">
      <h2>API Endpoints</h2>
      <div style="display:flex;gap:4px;align-items:center">
        <button class="api-clear" id="apiClearBtn" onclick="clearFilter()" style="display:none">Clear</button>
        <button class="panel-close" onclick="togglePanel()">&times;</button>
      </div>
    </div>
    <div class="api-list" id="apiList"></div>
  </div>
  <div class="viewport" id="viewport">
    <div class="toggle-panel" onclick="togglePanel()" title="Show API Panel">&#9776;</div>
    <div class="canvas" id="canvas"></div>
    <div class="legend" id="legend"></div>
  </div>
</div>

let currentService = 'web';
let zoom = 1, panX = 0, panY = 0;
let isPanning = false, panStartX = 0, panStartY = 0, panStartPX = 0, panStartPY = 0;
let activeApiIdx = null;
const TBL_W = 230;
const COL_H = 22;
const HEAD_H = 32;
const PAD = 14;

function tblH(cols) { return HEAD_H + cols.length * COL_H + PAD; }

// ===== RENDER =====
function render() {
  const data = DATA[currentService];
  renderApiPanel(data);
  renderERD(data);
  renderLegend(data);
  activeApiIdx = null;
  document.getElementById('apiClearBtn').style.display = 'none';
}

function renderApiPanel(data) {
  const list = document.getElementById('apiList');
  let html = '';
  data.apis.forEach((group, gi) => {
    html += `<div class="api-group open"><div class="api-group-title" onclick="this.parentElement.classList.toggle('open')">${group.g}</div><div class="api-group-items">`;
    group.items.forEach((api, ai) => {
      html += `<button class="api-btn" data-gi="${gi}" data-ai="${ai}" onclick="filterByApi(${gi},${ai},this)">
        <span class="api-method m-${api[0]}">${api[0]}</span>
        <div class="api-btn-info"><span class="api-path">${api[1]}</span><span class="api-desc">${api[2]}</span></div>
      </button>`;
    });
    html += '</div></div>';
  });
  list.innerHTML = html;
}

function renderERD(data) {
  const canvas = document.getElementById('canvas');
  let html = '<svg class="rel-svg" id="relSvg"></svg>';

  // Tables
  for (const [name, tbl] of Object.entries(data.tables)) {
    html += `<div class="tbl g-${tbl.g}" data-name="${name}" style="left:${tbl.x}px;top:${tbl.y}px;width:${TBL_W}px">`;
    html += `<div class="tbl-head">${name}</div><div class="tbl-cols">`;
    tbl.c.forEach(col => {
      const badge = col[2] === 'PK' ? '<span class="tbl-col-badge badge-pk">PK</span>' :
                    col[2] === 'FK' ? '<span class="tbl-col-badge badge-fk">FK</span>' :
                    '<span class="tbl-col-badge" style="visibility:hidden">--</span>';
      html += `<div class="tbl-col">${badge}<span class="tbl-col-name">${col[0]}</span><span class="tbl-col-type">${col[1]}</span></div>`;
    });
    html += '</div></div>';
  }
  canvas.innerHTML = html;

  // Relationships (SVG lines) - use setTimeout to ensure DOM is ready
  setTimeout(() => {
    drawRelationships(data);
    zoomFit();
  }, 100);
}

function drawRelationships(data) {
  const svg = document.getElementById('relSvg');
  if (!svg) return;
  const tables = data.tables;

  // Calculate canvas bounds
  let maxX = 0, maxY = 0;
  for (const tbl of Object.values(tables)) {
    maxX = Math.max(maxX, tbl.x + TBL_W + 50);
    maxY = Math.max(maxY, tbl.y + tblH(tbl.c) + 50);
  }
  svg.setAttribute('width', maxX);
  svg.setAttribute('height', maxY);
  svg.style.width = maxX + 'px';
  svg.style.height = maxY + 'px';

  let paths = '';
  const defs = `<defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" class="rel-marker"/>
    </marker>
    <marker id="crow" viewBox="0 0 12 12" refX="12" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12" stroke="#30363d" stroke-width="1.5" fill="none" class="rel-marker"/>
    </marker>
  </defs>`;

  (data.rels || []).forEach(([from, to]) => {
    const t1 = tables[from], t2 = tables[to];
    if (!t1 || !t2) return;
    const h1 = tblH(t1.c), h2 = tblH(t2.c);
    const cx1 = t1.x + TBL_W/2, cy1 = t1.y + h1/2;
    const cx2 = t2.x + TBL_W/2, cy2 = t2.y + h2/2;

    let p1, p2;
    const dx = cx2 - cx1, dy = cy2 - cy1;
    if (Math.abs(dx) * 0.7 > Math.abs(dy)) {
      if (dx > 0) {
        p1 = { x: t1.x + TBL_W, y: cy1 };
        p2 = { x: t2.x, y: cy2 };
      } else {
        p1 = { x: t1.x, y: cy1 };
        p2 = { x: t2.x + TBL_W, y: cy2 };
      }
    } else {
      if (dy > 0) {
        p1 = { x: cx1, y: t1.y + h1 };
        p2 = { x: cx2, y: t2.y };
      } else {
        p1 = { x: cx1, y: t1.y };
        p2 = { x: cx2, y: t2.y + h2 };
      }
    }

    const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
    const path = `M${p1.x},${p1.y} C${mx},${p1.y} ${mx},${p2.y} ${p2.x},${p2.y}`;
    paths += `<path d="${path}" class="rel-line" data-from="${from}" data-to="${to}" marker-end="url(#crow)"/>`;
  });

  svg.innerHTML = defs + paths;
}

function renderLegend(data) {
  const usedGroups = new Set();
  for (const tbl of Object.values(data.tables)) usedGroups.add(tbl.g);
  let html = '';
  for (const [key, grp] of Object.entries(GROUPS)) {
    if (!usedGroups.has(key)) continue;
    html += `<div class="legend-item"><div class="legend-dot" style="background:${grp.dot}"></div>${grp.label}</div>`;
  }
  document.getElementById('legend').innerHTML = html;
}

// ===== ZOOM / PAN =====
function applyTransform() {
  document.getElementById('canvas').style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  document.getElementById('zoomLabel').textContent = Math.round(zoom * 100) + '%';
}

function zoomBy(delta, cx, cy) {
  const vp = document.getElementById('viewport');
  if (cx === undefined) { cx = vp.clientWidth / 2; cy = vp.clientHeight / 2; }
  const oldZoom = zoom;
  zoom = Math.max(0.1, Math.min(3, zoom + delta));
  const scale = zoom / oldZoom;
  panX = cx - scale * (cx - panX);
  panY = cy - scale * (cy - panY);
  applyTransform();
}

function zoomReset() {
  zoom = 1; panX = 0; panY = 0;
  applyTransform();
}

function zoomFit() {
  const vp = document.getElementById('viewport');
  const data = DATA[currentService];
  let maxX = 0, maxY = 0;
  for (const tbl of Object.values(data.tables)) {
    maxX = Math.max(maxX, tbl.x + TBL_W + 20);
    maxY = Math.max(maxY, tbl.y + tblH(tbl.c) + 20);
  }
  const scaleX = (vp.clientWidth - 40) / maxX;
  const scaleY = (vp.clientHeight - 40) / maxY;
  zoom = Math.min(scaleX, scaleY, 1.2);
  panX = (vp.clientWidth - maxX * zoom) / 2;
  panY = (vp.clientHeight - maxY * zoom) / 2;
  applyTransform();
}

// Mouse wheel zoom
document.getElementById('viewport').addEventListener('wheel', e => {
  e.preventDefault();
  const rect = e.currentTarget.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  zoomBy(e.deltaY > 0 ? -0.08 : 0.08, cx, cy);
}, { passive: false });

// Pan
const vp = document.getElementById('viewport');
vp.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  isPanning = true;
  panStartX = e.clientX; panStartY = e.clientY;
  panStartPX = panX; panStartPY = panY;
});
window.addEventListener('mousemove', e => {
  if (!isPanning) return;
  panX = panStartPX + (e.clientX - panStartX);
  panY = panStartPY + (e.clientY - panStartY);
  applyTransform();
});
window.addEventListener('mouseup', () => { isPanning = false; });

// Touch pan/zoom
let touchStartDist = 0, touchStartZoom = 1;
vp.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isPanning = true;
    panStartX = e.touches[0].clientX; panStartY = e.touches[0].clientY;
    panStartPX = panX; panStartPY = panY;
  } else if (e.touches.length === 2) {
    isPanning = false;
    touchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    touchStartZoom = zoom;
  }
}, { passive: true });
vp.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && isPanning) {
    panX = panStartPX + (e.touches[0].clientX - panStartX);
    panY = panStartPY + (e.touches[0].clientY - panStartY);
    applyTransform();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    zoom = Math.max(0.1, Math.min(3, touchStartZoom * (dist / touchStartDist)));
    applyTransform();
  }
}, { passive: true });
vp.addEventListener('touchend', () => { isPanning = false; });

// ===== API FILTER =====
function filterByApi(gi, ai, btn) {
  const data = DATA[currentService];
  const api = data.apis[gi].items[ai];
  const tables = api[3];
  const key = `${gi}-${ai}`;

  // Toggle
  if (activeApiIdx === key) { clearFilter(); return; }
  activeApiIdx = key;

  // Highlight button
  document.querySelectorAll('.api-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('apiClearBtn').style.display = 'inline';

  // Highlight tables
  const tblSet = new Set(tables);
  document.querySelectorAll('.tbl').forEach(el => {
    const name = el.dataset.name;
    el.classList.toggle('dimmed', !tblSet.has(name));
    el.classList.toggle('highlighted', tblSet.has(name));
  });

  // Highlight relationships
  document.querySelectorAll('.rel-line').forEach(el => {
    const from = el.dataset.from, to = el.dataset.to;
    const active = tblSet.has(from) && tblSet.has(to);
    el.classList.toggle('dimmed', !active);
    el.classList.toggle('highlighted', active);
  });
  document.querySelectorAll('.rel-marker').forEach(el => {
    // Update markers via parent path
  });

  // Auto-fit to highlighted tables
  if (tables.length > 0) {
    let minX = Infinity, minY = Infinity, maxX = 0, maxY = 0;
    for (const name of tables) {
      const tbl = data.tables[name];
      if (!tbl) continue;
      minX = Math.min(minX, tbl.x);
      minY = Math.min(minY, tbl.y);
      maxX = Math.max(maxX, tbl.x + TBL_W);
      maxY = Math.max(maxY, tbl.y + tblH(tbl.c));
    }
    const vpEl = document.getElementById('viewport');
    const pad = 60;
    const w = maxX - minX + pad * 2;
    const h = maxY - minY + pad * 2;
    const scaleX = vpEl.clientWidth / w;
    const scaleY = vpEl.clientHeight / h;
    const newZoom = Math.min(scaleX, scaleY, 1.5);
    zoom = newZoom;
    panX = (vpEl.clientWidth - w * zoom) / 2 - (minX - pad) * zoom;
    panY = (vpEl.clientHeight - h * zoom) / 2 - (minY - pad) * zoom;
    applyTransform();
  }
}

function clearFilter() {
  activeApiIdx = null;
  document.querySelectorAll('.api-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('apiClearBtn').style.display = 'none';
  document.querySelectorAll('.tbl').forEach(el => {
    el.classList.remove('dimmed', 'highlighted');
  });
  document.querySelectorAll('.rel-line').forEach(el => {
    el.classList.remove('dimmed', 'highlighted');
  });
}

function switchService(svc) {
  currentService = svc;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['web','mobile','biosignal'][i] === svc);
  });
  render();
}

function togglePanel() {
  document.getElementById('apiPanel').classList.toggle('hidden');
  setTimeout(() => zoomFit(), 100);
}

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (e.key === '=' || e.key === '+') zoomBy(0.15);
  if (e.key === '-') zoomBy(-0.15);
  if (e.key === '0') zoomReset();
  if (e.key === 'Escape') clearFilter();
});

// ===== INIT =====
render();
</script>
